<div class="login-container">
  <div class="login-card-container">
    <!-- Background Pattern -->
    <div class="background-pattern"></div>
    
    <!-- Main Login Card -->
    <mat-card class="login-card">
      <!-- Header Section -->
      <div class="login-header">
        <div class="logo-section">
          <mat-icon class="logo-icon">assessment</mat-icon>
          <h1 class="app-title">Generador de Reportes</h1>
        </div>
        <p class="login-subtitle">Accede a tu sistema de reportes empresariales</p>
      </div>

      <!-- Login Form -->
      <mat-card-content class="login-content">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
          
          <!-- Username Field -->
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Usuario</mat-label>
            <input 
              matInput 
              formControlName="username" 
              placeholder="Ingrese su usuario"
              autocomplete="username">
            <mat-icon matSuffix>person</mat-icon>
            <mat-error *ngIf="username?.invalid && username?.touched">
              {{ getUsernameErrorMessage() }}
            </mat-error>
          </mat-form-field>

          <!-- Password Field -->
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Contraseña</mat-label>
            <input 
              matInput 
              [type]="hidePassword ? 'password' : 'text'"
              formControlName="password" 
              placeholder="Ingrese su contraseña"
              autocomplete="current-password">
            <button 
              mat-icon-button 
              matSuffix 
              type="button"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="'Hide password'" 
              [attr.aria-pressed]="hidePassword">
              <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error *ngIf="password?.invalid && password?.touched">
              {{ getPasswordErrorMessage() }}
            </mat-error>
          </mat-form-field>

          <!-- Login Button -->
          <button 
            mat-raised-button 
            color="primary" 
            type="submit" 
            class="login-button full-width"
            [disabled]="isLoading">
            <mat-icon *ngIf="!isLoading">login</mat-icon>
            <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
            {{ isLoading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
          </button>

        </form>
      </mat-card-content>

      <!-- Footer Info -->
      <mat-card-actions class="login-footer">
        <div class="info-section">
          <mat-icon class="info-icon">info</mat-icon>
          <div class="info-text">
            <small>Usuario: <strong>adminreporte</strong></small><br>
            <small>Sistema seguro empresarial</small>
          </div>
        </div>
      </mat-card-actions>

    </mat-card>
  </div>

  <!-- Footer -->
  <div class="app-footer">
    <p>&copy; 2026 oDres - Sistema Generador de Reportes</p>
  </div>
</div>
